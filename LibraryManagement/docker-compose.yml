services:
  api:
    build: .
    ports:
      - "3000:3000"

    env_file:
      - .env
    depends_on:
      - postgres

  postgres:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: library_db

    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
